spring:
  datasource:
    url: jdbc:h2:mem:transitopsdb;DB_CLOSE_DELAY=-1
    driverClassName: org.h2.Driver
    username: sa
    password: password

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:transitops-hackathon-super-secret-key-change-me-32bytes-min}
  access-token-expiration-ms: 900000      # 15 minutes
  refresh-token-expiration-ms: 604800000  # 7 days

logging:
  level:
    org.springframework.security: TRACE

transitops:
  seed:
    enabled: true