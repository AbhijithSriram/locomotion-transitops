spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/transitops
    username: postgres
    password: postgres

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:transitops-hackathon-super-secret-key-change-me-32bytes-min}
  access-token-expiration-ms: 900000      # 15 minutes
  refresh-token-expiration-ms: 604800000  # 7 days

logging:
  level:
    org.springframework.security: TRACE